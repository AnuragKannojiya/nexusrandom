openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: NexusRandom API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: reports
    description: User report operations
  - name: stats
    description: Platform stats operations
  - name: bans
    description: User ban operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stats:
    get:
      operationId: getPlatformStats
      tags: [stats]
      summary: Get platform statistics
      description: Returns online user count and recent chat statistics
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /reports:
    post:
      operationId: createReport
      tags: [reports]
      summary: Report a user
      description: Submit a report against a stranger session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportBody"
      responses:
        "201":
          description: Report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: getReports
      tags: [reports]
      summary: Get all reports (admin)
      description: Get all submitted reports for moderation
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"

  /bans:
    get:
      operationId: getBans
      tags: [bans]
      summary: Get active bans (admin)
      description: Get all active bans
      responses:
        "200":
          description: List of bans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ban"

    post:
      operationId: createBan
      tags: [bans]
      summary: Ban a user
      description: Ban a user by hashed IP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBanBody"
      responses:
        "201":
          description: Ban created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ban"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bans/check:
    get:
      operationId: checkBanStatus
      tags: [bans]
      summary: Check if current user is banned
      description: Check if the current user IP is banned
      responses:
        "200":
          description: Ban status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BanStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    PlatformStats:
      type: object
      properties:
        onlineUsers:
          type: integer
        activeChats:
          type: integer
        totalChatsToday:
          type: integer
      required:
        - onlineUsers
        - activeChats
        - totalChatsToday

    CreateReportBody:
      type: object
      properties:
        sessionId:
          type: string
          description: The chat session ID in which the report occurred
        reason:
          type: string
          enum: [spam, harassment, inappropriate_content, bot, other]
        description:
          type: ["string", "null"]
      required:
        - sessionId
        - reason

    Report:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: string
        reporterIpHash:
          type: string
        reason:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sessionId
        - reporterIpHash
        - reason
        - createdAt

    CreateBanBody:
      type: object
      properties:
        ipHash:
          type: string
        reason:
          type: string
        expiresAt:
          type: ["string", "null"]
          format: date-time
      required:
        - ipHash
        - reason

    Ban:
      type: object
      properties:
        id:
          type: integer
        ipHash:
          type: string
        reason:
          type: string
        expiresAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - ipHash
        - reason
        - createdAt

    BanStatus:
      type: object
      properties:
        banned:
          type: boolean
        reason:
          type: ["string", "null"]
        expiresAt:
          type: ["string", "null"]
          format: date-time
      required:
        - banned

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
