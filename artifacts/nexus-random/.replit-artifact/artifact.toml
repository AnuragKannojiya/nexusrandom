kind = "web"
previewPath = "/nexus-random/"
title = "NexusRandom"
version = "1.0.0"
id = "artifacts/nexus-random"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/nexus-random" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/nexus-random run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexus-random", "run", "build" ]
publicDir = "artifacts/nexus-random/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/nexus-random/*"
to = "/nexus-random/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/nexus-random/"
